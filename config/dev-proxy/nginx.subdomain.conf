# Autonomy Platform — Nginx config for wildcard subdomain routing
#
# Handles:
#   login.azirella.com      → Login portal (same frontend, different route)
#   autonomy.azirella.com   → Default app (all tenants via JWT)
#   {slug}.azirella.com     → Vanity subdomain (same app, validated by backend)
#
# All subdomains route to the same frontend + backend containers.
# Tenant isolation is enforced by the backend (JWT tenant_slug claim),
# NOT by nginx routing. Nginx just passes the Host header through.
#
# Prerequisites:
#   - Wildcard DNS:  *.azirella.com → this server's IP
#   - Wildcard cert: *.azirella.com (via AWS ACM, Let's Encrypt DNS-01, or self-signed)
#
# Usage:
#   docker compose -f docker-compose.yml up -d
#   # Mount this file as /etc/nginx/conf.d/default.conf in the proxy container

# Upstream definitions
upstream frontend {
    server frontend:80;
}

upstream backend {
    server backend:8000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name *.azirella.com azirella.com;
    return 301 https://$host$request_uri;
}

# HTTPS with wildcard cert
server {
    listen 443 ssl http2;
    server_name *.azirella.com azirella.com;

    # Wildcard SSL certificate (from ACM via ALB, Let's Encrypt, or self-signed)
    ssl_certificate     /etc/ssl/certs/azirella.com.pem;
    ssl_certificate_key /etc/ssl/private/azirella.com.key;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Health check (used by ALB)
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # API + WebSocket → Backend
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_pass http://backend;
    }

    location /ws/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_pass http://backend;
    }

    # Frontend (React SPA)
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://frontend;
    }
}
