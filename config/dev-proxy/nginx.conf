worker_processes  1;

events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile        on;
  keepalive_timeout  65;

  server {
    listen 8088;
    server_name _;

    # Frontend (served by frontend container's Nginx)
    location / {
      proxy_pass http://frontend:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend health check (no rewrite)
    location = /api/health {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://backend:8000;
    }

    # Backend API (preserve /api/* path)
    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Forward to backend (no rewrite needed - backend uses /api prefix)
      proxy_pass http://backend:8000;
    }

    # WebSockets (backend uses /ws/*)
    location /ws/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_pass http://backend:8000;
    }

    # MCP Server (Autonomy as MCP provider)
    # NOTE: the `mcp-server` upstream container is optional and not part of
    # the default docker-compose. Using a runtime variable for proxy_pass
    # so nginx does NOT fail to start when mcp-server is absent — DNS is
    # resolved per-request by the embedded resolver below. When the
    # mcp-server container is not running, requests to /mcp/ return 502,
    # but the rest of the proxy (frontend + /api/*) continues to serve.
    resolver 127.0.0.11 ipv6=off valid=30s;
    location /mcp/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      set $mcp_upstream "http://mcp-server:8001";
      proxy_pass $mcp_upstream$request_uri;
    }

    # Container health check endpoint
    location = /healthz {
      default_type text/plain;
      return 200 "ok";
    }
  }
}

