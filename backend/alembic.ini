[alembic]
script_location = migrations
# Prepend backend/ to sys.path so env.py's `from app.db.base import Base`
# resolves when alembic is invoked from `working-directory: backend`.
# Same fix pattern as SCP's alembic.ini — without it, fresh-DB upgrades
# fail with `ModuleNotFoundError: No module named 'app'`.
prepend_sys_path = .
sqlalchemy.url = ${DATABASE_URL}

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
