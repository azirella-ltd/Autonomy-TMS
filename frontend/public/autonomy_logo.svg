<svg xmlns="http://www.w3.org/2000/svg" width="350" height="100" viewBox="0 0 350 100">
  <defs>
    <linearGradient id="brainLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5A"/>
      <stop offset="100%" stop-color="#2D5A7B"/>
    </linearGradient>
    <linearGradient id="nodeLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Network connections -->
  <path d="M50 50 L20 20" stroke="#1E3A5A" stroke-width="1.5" opacity="0.4"/>
  <path d="M50 50 L10 50" stroke="#1E3A5A" stroke-width="1.5" opacity="0.4"/>
  <path d="M50 50 L20 80" stroke="#1E3A5A" stroke-width="1.5" opacity="0.4"/>
  <path d="M50 50 L80 20" stroke="#1E3A5A" stroke-width="1.5" opacity="0.4"/>
  <path d="M50 50 L90 50" stroke="#1E3A5A" stroke-width="1.5" opacity="0.4"/>
  <path d="M50 50 L80 80" stroke="#1E3A5A" stroke-width="1.5" opacity="0.4"/>

  <!-- Secondary connections between outer nodes -->
  <path d="M20 20 L10 50" stroke="#2D5A7B" stroke-width="1" stroke-dasharray="2,2" opacity="0.3"/>
  <path d="M10 50 L20 80" stroke="#2D5A7B" stroke-width="1" stroke-dasharray="2,2" opacity="0.3"/>
  <path d="M80 20 L90 50" stroke="#2D5A7B" stroke-width="1" stroke-dasharray="2,2" opacity="0.3"/>
  <path d="M90 50 L80 80" stroke="#2D5A7B" stroke-width="1" stroke-dasharray="2,2" opacity="0.3"/>

  <!-- Brain outline with circuit feel -->
  <ellipse cx="50" cy="50" rx="22" ry="24" fill="none" stroke="url(#brainLight)" stroke-width="3"/>

  <!-- Circuit-style brain interior -->
  <circle cx="50" cy="50" r="8" fill="url(#brainLight)"/>
  <path d="M50 42 L50 35" stroke="#1E3A5A" stroke-width="2"/>
  <path d="M50 58 L50 65" stroke="#1E3A5A" stroke-width="2"/>
  <path d="M42 50 L35 50" stroke="#1E3A5A" stroke-width="2"/>
  <path d="M58 50 L65 50" stroke="#1E3A5A" stroke-width="2"/>
  <circle cx="50" cy="35" r="3" fill="#1E3A5A"/>
  <circle cx="50" cy="65" r="3" fill="#1E3A5A"/>
  <circle cx="35" cy="50" r="3" fill="#1E3A5A"/>
  <circle cx="65" cy="50" r="3" fill="#1E3A5A"/>

  <!-- Outer nodes - supply chain points -->
  <circle cx="20" cy="20" r="6" fill="url(#nodeLight)"/>
  <circle cx="10" cy="50" r="6" fill="url(#nodeLight)"/>
  <circle cx="20" cy="80" r="6" fill="url(#nodeLight)"/>
  <circle cx="80" cy="20" r="6" fill="url(#nodeLight)"/>
  <circle cx="90" cy="50" r="6" fill="url(#nodeLight)"/>
  <circle cx="80" cy="80" r="6" fill="url(#nodeLight)"/>

  <!-- Text -->
  <text x="115" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="600" fill="#1E3A5A" dominant-baseline="central">Autonomy</text>
</svg>
