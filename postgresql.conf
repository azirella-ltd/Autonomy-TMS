# PostgreSQL Configuration for The Beer Game
# Replaces: mariadb.cnf
# Optimized for development and small-to-medium production workloads

# =============================================================================
# CONNECTION SETTINGS
# =============================================================================
listen_addresses = '*'                  # Listen on all interfaces
port = 5432                             # Default PostgreSQL port
max_connections = 200                   # Maximum concurrent connections
superuser_reserved_connections = 3      # Reserved for superuser

# =============================================================================
# MEMORY SETTINGS
# =============================================================================
# Adjust these based on available system memory
# For 8GB RAM server, these are good starting values

shared_buffers = 256MB                  # Memory for caching data (25% of RAM for dedicated DB server)
effective_cache_size = 1GB              # Estimate of OS cache (75% of RAM)
work_mem = 4MB                          # Memory per operation (sort, hash)
maintenance_work_mem = 64MB             # Memory for VACUUM, CREATE INDEX, etc.

# =============================================================================
# WRITE AHEAD LOG (WAL) SETTINGS
# =============================================================================
wal_buffers = 16MB                      # WAL buffer size
min_wal_size = 1GB                      # Minimum WAL size before recycling
max_wal_size = 4GB                      # Maximum WAL size before checkpoint
checkpoint_completion_target = 0.9      # Spread checkpoints over 90% of interval
wal_compression = on                    # Compress WAL records

# =============================================================================
# QUERY PLANNER SETTINGS
# =============================================================================
default_statistics_target = 100         # Statistics detail for query planner
random_page_cost = 1.1                  # Cost of random page fetch (1.1 for SSD, 4.0 for HDD)
effective_io_concurrency = 200          # Number of concurrent disk I/O ops (100-500 for SSD)

# =============================================================================
# PARALLEL QUERY SETTINGS
# =============================================================================
max_worker_processes = 8                # Maximum background processes
max_parallel_workers_per_gather = 4     # Max parallel workers per query
max_parallel_workers = 8                # Max parallel workers system-wide

# =============================================================================
# CONNECTION SETTINGS
# =============================================================================
idle_in_transaction_session_timeout = 600000    # 10 minutes in milliseconds
tcp_keepalives_idle = 600               # TCP keepalive time (seconds)
tcp_keepalives_interval = 10            # TCP keepalive interval
tcp_keepalives_count = 5                # TCP keepalive probes

# =============================================================================
# LOGGING SETTINGS
# =============================================================================
logging_collector = on                  # Enable log collection
log_directory = 'pg_log'                # Log directory
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d                   # Rotate daily
log_rotation_size = 100MB               # Or when file reaches 100MB

# What to log
log_statement = 'none'                  # none, ddl, mod, all (use 'none' in production)
log_duration = off                      # Log query durations (use 'on' for debugging)
log_min_duration_statement = -1         # Log queries slower than N ms (-1 = disabled)

# Log line format
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_timezone = 'UTC'

# =============================================================================
# AUTOVACUUM SETTINGS
# =============================================================================
# Critical for PostgreSQL performance - keeps statistics up to date
autovacuum = on                         # Enable autovacuum
autovacuum_max_workers = 3              # Max autovacuum workers
autovacuum_naptime = 1min               # Time between autovacuum runs
autovacuum_vacuum_threshold = 50        # Min row updates before vacuum
autovacuum_analyze_threshold = 50       # Min row updates before analyze
autovacuum_vacuum_scale_factor = 0.1    # Fraction of table size before vacuum
autovacuum_analyze_scale_factor = 0.05  # Fraction of table size before analyze

# =============================================================================
# LOCALE AND FORMATTING
# =============================================================================
datestyle = 'iso, mdy'
timezone = 'UTC'                        # Use UTC for consistency
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'

# Default encoding for new databases
default_text_search_config = 'pg_catalog.english'

# =============================================================================
# CLIENT CONNECTION DEFAULTS
# =============================================================================
# These can be overridden per connection
client_encoding = 'UTF8'

# =============================================================================
# LOCK MANAGEMENT
# =============================================================================
deadlock_timeout = 1s                   # Time to wait before checking for deadlock

# =============================================================================
# ERROR REPORTING AND LOGGING VERBOSITY
# =============================================================================
# Production: warning or error
# Development: notice or info
log_min_messages = warning              # Server messages to log
client_min_messages = notice            # Messages sent to client

# =============================================================================
# RUNTIME STATISTICS
# =============================================================================
# Enable for performance monitoring
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all          # Track all queries
pg_stat_statements.max = 10000          # Track up to 10000 queries

# =============================================================================
# NOTES FOR PRODUCTION TUNING
# =============================================================================
# For production with 16GB RAM:
# shared_buffers = 4GB
# effective_cache_size = 12GB
# work_mem = 16MB
# maintenance_work_mem = 512MB
#
# For production with 32GB RAM:
# shared_buffers = 8GB
# effective_cache_size = 24GB
# work_mem = 32MB
# maintenance_work_mem = 1GB
#
# Enable query logging for debugging:
# log_statement = 'all'
# log_min_duration_statement = 1000  # Log queries > 1 second
#
# For write-heavy workloads:
# wal_buffers = 32MB
# max_wal_size = 8GB
# checkpoint_completion_target = 0.9
