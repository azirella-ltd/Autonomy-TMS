# TMS dev override — joins SCP's network and configures the SCP read connection.
#
# This file is per Trevor's setup on 2026-04-14 (SCP DBA created `tms_reader` role
# and SCP exposes `autonomy-scp-db` service on the `autonomy-scp_autonomy-network`
# external Docker network).
#
# IMPORTANT: This override only works when TMS runs on the SAME Docker host as SCP
# (e.g., both stacks on msi-stealth). Docker external networks don't span hosts.
#
# If running TMS on a different host than SCP, comment out the `networks` block
# below and instead set SCP_DB_URL to a TCP URL pointing at SCP's host-exposed
# Postgres port (requires SCP to publish 5432 in its compose, e.g. "5433:5432"):
#
#   SCP_DB_URL: postgresql+psycopg2://tms_reader:tms_reader_dev@msi-stealth.local:5433/autonomy

networks:
  autonomy-scp_autonomy-network:
    external: true

services:
  backend:
    # Force GPU build on msi-stealth (RTX 4060)
    build:
      context: ./backend
      dockerfile: Dockerfile.gpu
      args:
        - FORCE_GPU=1
      secrets:
        - autonomy_core_token
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./sap_demo_csvs:/app/data/sap_demo:ro
    # SCP backend already owns host port 8000 on msi-stealth; remap TMS to 8010
    ports: !override
      - "8010:8000"
    networks:
      default: {}
      # Join SCP's network only to reach `autonomy-scp-db`. Override the default
      # service-name alias so we don't also register as `backend` there — that
      # alias is owned by autonomy-scp-backend and collisions cause Docker DNS
      # round-robin between the two backends, breaking SCP auth.
      autonomy-scp_autonomy-network:
        aliases:
          - autonomy-tms-backend
    environment:
      SCP_DB_URL: postgresql+psycopg2://tms_reader:tms_reader_dev@autonomy-scp-db:5432/autonomy
      # IMPORTANT: SCP's Postgres service is also named `db` — when the TMS
      # backend joins both networks, bare `db` hostname becomes ambiguous and
      # can resolve to SCP's DB, silently writing TMS data into SCP. Force the
      # TMS DB URL to use the explicit container-alias hostname.
      DATABASE_URL: postgresql+psycopg2://autonomy_user:autonomy_password@autonomy-tms-db:5432/autonomy
      ASYNC_DATABASE_URL: postgresql+asyncpg://autonomy_user:autonomy_password@autonomy-tms-db:5432/autonomy
